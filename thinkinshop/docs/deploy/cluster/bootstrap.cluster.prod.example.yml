server:
  port: 21898
  servlet:
    context-path: /apis

spring:
  application:
    name: laike-apis

  redis:
    cluster:
      nodes:
        - __REDIS_NODE_1__:6379
        - __REDIS_NODE_2__:6379
        - __REDIS_NODE_3__:6379
    password: "__REDIS_PASSWORD__"
    timeout: 30000
    lettuce:
      pool:
        max-active: 50
        max-idle: 20
        min-idle: 5

  shardingsphere:
    datasource:
      names: lkt-ds-master-0
      lkt-ds-master-0:
        type: com.alibaba.druid.pool.DruidDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://__RDS_HOST__:3306/__RDS_DB__?useUnicode=true&characterEncoding=utf-8&serverTimezone=GMT%2B8&allowMultiQueries=true&rewriteBatchedStatements=true
        username: __RDS_USER__
        password: __RDS_PASSWORD__

uploadFile:
  path: /opt/laike/apis/upload/

node:
  wx-certp12-path: /opt/laike/apis/certs

xxl:
  job:
    accessToken: ""
    admin:
      addresses: https://__TASK_DOMAIN__/apis
    executor:
      appname: laike-task
      ip:
      port: 2026
      logpath: /opt/laike/apis/xxl-logs
      logretentiondays: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  config: classpath:logback-spring.xml
