server:
  port: 21898
  servlet:
    context-path: /apis

spring:
  application:
    name: laike-apis

  redis:
    cluster:
      nodes:
        - r-1.redis.rds.aliyuncs.com:6379
        - r-2.redis.rds.aliyuncs.com:6379
        - r-3.redis.rds.aliyuncs.com:6379
    password: "${REDIS_PASSWORD}"
    timeout: 30000
    lettuce:
      pool:
        max-active: 50
        min-idle: 5
        max-idle: 20

  shardingsphere:
    datasource:
      names: lkt-ds-master-0
      lkt-ds-master-0:
        type: com.alibaba.druid.pool.DruidDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://rm-xxxx.mysql.rds.aliyuncs.com:3306/v3_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=GMT%2B8&allowMultiQueries=true&rewriteBatchedStatements=true
        username: ${DB_USER}
        password: ${DB_PASSWORD}

uploadFile:
  path: /opt/laike/apis/upload/

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
