  groupName: 任务调度
  contactName: task
  contactUrl: http://www.laiketui.com/
  contactEmail:
#xxl-job
xxl:
  job:
    accessToken:
    admin:
      addresses: http://127.0.0.1:3366/task # 任务调度中心部署根地址（必填）
    executor:
      appname: laike-task                   # 对应 执行管理器 AppName
      ip: 127.0.0.1                         # 执行器ip，可以不填，会自动识别注册
      logpath: ./xxljob-logs               # 执行器运行日志文件存储磁盘路径
      logretentiondays: 30                  # 执行器日志保存天数，值大于3时生效，启用执行器log文件定期清理功能，否则不生效。
      port: 2024                            # 执行器端口号
      #AccessToken：执行器通讯token，非空时启用