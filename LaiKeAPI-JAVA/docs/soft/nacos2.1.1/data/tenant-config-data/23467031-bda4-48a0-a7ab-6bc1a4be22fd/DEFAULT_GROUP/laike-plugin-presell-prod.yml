# Nacos 注册中心
dubbo:
  application:
    name: laike-plugin-presell
    # 禁用QOS同一台机器可能会有端口冲突现象
    qos-enable: false
    qos-accept-foreign-ip: false
    # 配置注册中心
  registry:
    address: nacos://localhost:8848
    parameters: laike-dubbo-nacos
  # 设置超时时间
  consumer:
    timeout: 6000
  protocol:
    name: dubbo
    port: ${NACOS_PORT:21924}


