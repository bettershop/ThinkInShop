  flyway:
    enabled: false
  jmx:
    enabled: false
  http:
    encoding:
      force: true
      charset: UTF-8
      enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB
      file-size-threshold: 1
  messages:
    fallbackToSystemLocale: false
    basename: i18n/tips
    encoding: UTF-8

#文件上传路径
uploadFile:
  path: /usr/local/imgs/

#通用-日志配置
logging:
  config: classpath:logback-spring.xml
  level:
    com:
      laiketui: info

